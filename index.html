<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENVIA — Control de Ausentismo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E30613;
      --red-dark: #a8040e;
      --black: #0a0a0a;
      --white: #f5f5f5;
      --gray: #1a1a1a;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(227,6,19,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(227,6,19,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Red glow top */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(227,6,19,0.2) 0%, transparent 70%);
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 50px;
      max-width: 420px;
      width: 90%;
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      letter-spacing: 4px;
      color: var(--red);
      line-height: 1;
      animation: slideDown 0.6s ease both;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(245,245,245,0.4);
      margin-top: 6px;
      animation: slideDown 0.6s ease 0.1s both;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--red);
      margin: 28px auto;
      animation: expand 0.6s ease 0.2s both;
    }

    @keyframes expand {
      from { width: 0; opacity: 0; }
      to { width: 40px; opacity: 1; }
    }

    .status-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 24px;
      animation: fadeIn 0.6s ease 0.3s both;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(227,6,19,0.2);
      border-top-color: var(--red);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      font-size: 14px;
      color: rgba(245,245,245,0.7);
      font-weight: 300;
      line-height: 1.6;
    }

    .status-text strong {
      color: var(--white);
      font-weight: 500;
    }

    .countdown {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      color: var(--red);
      margin-top: 12px;
      letter-spacing: 2px;
    }

    .manual-link {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(245,245,245,0.3);
    }

    .manual-link a {
      color: rgba(227,6,19,0.7);
      text-decoration: none;
      border-bottom: 1px solid rgba(227,6,19,0.3);
      transition: all 0.2s;
    }

    .manual-link a:hover {
      color: var(--red);
      border-color: var(--red);
    }

    .footer {
      margin-top: 32px;
      font-size: 11px;
      color: rgba(245,245,245,0.2);
      letter-spacing: 1px;
      animation: fadeIn 0.6s ease 0.5s both;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-text">ENVIA</div>
    <div class="subtitle">Control de Ausentismo</div>
    <div class="divider"></div>

    <div class="status-box">
      <div class="spinner"></div>
      <div class="status-text">
        Redirigiendo al sistema...<br>
        <strong>Serás dirigido automáticamente</strong>
      </div>
      <div class="countdown" id="countdown">3</div>
    </div>

    <div class="manual-link">
      ¿No redirige? <a href="https://script.google.com/macros/s/AKfycbzQxi1dvGW5oUCzXBreH_FsYX4lYd1vXJ8645ifxsArjwVAu_N-LJKSwPjVVQqG-jQo/exec" id="direct-link">Haz clic aquí</a>
    </div>

    <div class="footer">© 2026 ENVIA COLVANES S.A.S</div>
  </div>

  <script>
    var TARGET = 'https://script.google.com/macros/s/AKfycbzQxi1dvGW5oUCzXBreH_FsYX4lYd1vXJ8645ifxsArjwVAu_N-LJKSwPjVVQqG-jQo/exec';

    var n = 3;
    var el = document.getElementById('countdown');

    var timer = setInterval(function() {
      n--;
      el.textContent = n;
      if (n <= 0) {
        clearInterval(timer);
        window.location.replace(TARGET);
      }
    }, 1000);
  </script>

</body>
</html>
