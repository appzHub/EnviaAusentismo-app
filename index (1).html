<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENVIA — Control de Ausentismo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A1A;
      font-family: Arial, sans-serif;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #1A1A1A 0%, #2a2a2a 50%, #B5000D 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.5s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo {
      font-size: 64px;
      font-weight: 900;
      color: #E30613;
      letter-spacing: 6px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 32px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(227,6,19,0.2);
      border-top-color: #E30613;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="logo">ENVIA</div>
    <div class="subtitle">Control de Ausentismo</div>
    <div class="spinner"></div>
  </div>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzQxi1dvGW5oUCzXBreH_FsYX4lYd1vXJ8645ifxsArjwVAu_N-LJKSwPjVVQqG-jQo/exec"
    allowfullscreen
    allow="camera; microphone; fullscreen"
    onload="document.getElementById('loader').classList.add('hidden')"
  ></iframe>

</body>
</html>
